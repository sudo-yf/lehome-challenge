# X-VLA Final Valid Config for Lehome
# Precision-aligned with official checkpoint

dataset:
  repo_id: lehome/dataset_challenge_merged
  root: Datasets/example/top_long_merged
  video_backend: torchcodec
  use_imagenet_stats: true
  image_transforms:
    enable: true
    max_num_transforms: 3
    random_order: false
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.8, 1.2]
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs:
          contrast: [0.8, 1.2]
      saturation:
        weight: 1.0
        type: ColorJitter
        kwargs:
          saturation: [0.5, 1.5]
      hue:
        weight: 1.0
        type: ColorJitter
        kwargs:
          hue: [-0.05, 0.05]
      sharpness:
        weight: 1.0
        type: SharpnessJitter
        kwargs:
          sharpness: [0.5, 1.5]

policy:
  type: xvla
  repo_id: lehome/xvla_so100
  push_to_hub: false
  pretrained_path: lerobot/xvla-base
  # [核心修复1] 强制对齐动作步长 (32 -> 30)
  n_action_steps: 30
  chunk_size: 30
  # [核心修复2] 匹配预训练模型的视角数量 (3个视角)
  empty_cameras: 0 # 预训练模型使用3个真实视角

  # [核心修复3] 使用auto action mode自动适配数据集的action维度
  action_mode: auto
  max_action_dim: 20 # 与预训练模型保持一致
  max_state_dim: 20 # 官方默认值，支持更大维度的数据集

  # [核心修复4] 匹配预训练模型的视角数量
  num_image_views: 3 # 预训练模型使用3个视角（2真实+1空）
  # [核心修复3] 图像缩放
  resize_imgs_with_padding: [224, 224]
  # 显存优化
  dtype: bfloat16
  # [关键] 必须显式提供，否则报 ValueError
  florence_config:
    projection_dim: 1024
    vision_config:
      model_type: davit
      image_size: 224
      projection_dim: 1024
      patch_size: [7, 3, 3, 3]
      patch_stride: [4, 2, 2, 2]
      patch_padding: [3, 1, 1, 1]
      patch_prenorm: [false, true, true, true]
      dim_embed: [256, 512, 1024, 2048]
      num_heads: [8, 16, 32, 64]
      num_groups: [8, 16, 32, 64]
      depths: [1, 1, 9, 1]
      window_size: 12
      image_pos_embed:
        type: learned_abs_2d
        max_pos_embeddings: 50
      visual_temporal_embedding:
        type: COSINE
        max_temporal_embeddings: 100
      # 显式指定特征源，确保每个视角只产生 2 个 token
      image_feature_source: ["spatial_avg_pool", "temporal_avg_pool"]

    text_config:
      vocab_size: 51289
      d_model: 1024
      encoder_layers: 12
      decoder_layers: 12
      encoder_attention_heads: 16
      decoder_attention_heads: 16
      max_position_embeddings: 4096

  # 微调策略
  freeze_vision_encoder: false
  freeze_language_encoder: false
  train_policy_transformer: true
  train_soft_prompts: true
  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

# 训练参数
output_dir: outputs/train/top_long/xvla_base_3w_steps
batch_size: 8
steps: 30000
save_freq: 5000
eval_freq: 5000
log_freq: 1000
save_checkpoint: true

optimizer:
  type: xvla-adamw
  lr: 1e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  eps: 1e-8
  grad_clip_norm: 10.0

scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1000
  num_decay_steps: 30000
  peak_lr: 1e-4
  decay_lr: 2.5e-6

wandb:
  enable: false
  project: lehome_xvla
  mode: disabled