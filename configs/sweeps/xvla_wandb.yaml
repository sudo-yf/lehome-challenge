name: xvla-sweep
method: bayes
project: lehome_xvla_sweep
metric:
  name: train/loss
  goal: minimize
parameters:
  batch_size:
    values: [4, 8]
  steps:
    value: 30000
  policy.optimizer_lr:
    distribution: log_uniform_values
    min: 5.0e-6
    max: 1.0e-4
  policy.optimizer_weight_decay:
    values: [0.0, 1.0e-4, 5.0e-4]
  policy.scheduler_warmup_steps:
    values: [500, 1000, 2000]
early_terminate:
  type: hyperband
  min_iter: 3
