name: xvla-eval-narrow-30k
method: bayes
project: lehome_xvla_eval_narrow
metric:
  name: eval/pc_success
  goal: maximize
parameters:
  batch_size:
    values: [4, 8]
  steps:
    value: 30000
  policy_optimizer_lr:
    arg_name: policy.optimizer_lr
    distribution: log_uniform_values
    min: 1.8e-5
    max: 2.8e-5
  policy_optimizer_weight_decay:
    arg_name: policy.optimizer_weight_decay
    values: [0.0, 1.0e-4]
  policy_scheduler_warmup_steps:
    arg_name: policy.scheduler_warmup_steps
    value: 1000
  policy_scheduler_decay_steps:
    arg_name: policy.scheduler_decay_steps
    value: 30000
  policy_scheduler_decay_lr:
    arg_name: policy.scheduler_decay_lr
    value: 2.5e-6
early_terminate:
  type: hyperband
  min_iter: 2000
